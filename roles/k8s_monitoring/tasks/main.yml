---
- name: Ensure kubeconfig exists
  ansible.builtin.stat:
    path: "{{ kubeconfig_path }}"
  register: kubeconfig_stat

- name: Fail if kubeconfig missing
  ansible.builtin.fail:
    msg: "kubeconfig not found at {{ kubeconfig_path }}."
  when: not kubeconfig_stat.stat.exists

- name: Create monitoring namespace
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig_path }}"
    state: present
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: "{{ monitoring_namespace }}"

- name: Add Helm repo (prometheus-community)
  kubernetes.core.helm_repository:
    name: prometheus-community
    repo_url: "https://prometheus-community.github.io/helm-charts"

- name: Install kube-prometheus-stack (Prometheus + Grafana)
  kubernetes.core.helm:
    kubeconfig: "{{ kubeconfig_path }}"
    name: "{{ prom_stack_release }}"
    chart_ref: "{{ prom_stack_chart }}"
    release_namespace: "{{ monitoring_namespace }}"
    create_namespace: false
    values:
      grafana:
        adminPassword: "ChangeMe123!"
