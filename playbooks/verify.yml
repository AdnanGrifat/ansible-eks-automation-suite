---
- name: Verify Node Exporter on CentOS nodes
  hosts: centos_nodes
  become: true
  tasks:
    - name: Check node_exporter service status
      ansible.builtin.command: systemctl is-active node_exporter
      register: ne_status
      changed_when: false
      failed_when: ne_status.stdout.strip() != "active"

    - name: Show node_exporter status
      ansible.builtin.debug:
        msg: "node_exporter is {{ ne_status.stdout.strip() }} on {{ inventory_hostname }}"

- name: Verify Kubernetes resources
  hosts: k8s
  become: false
  tasks:
    - name: Ensure kubeconfig exists
      ansible.builtin.stat:
        path: "{{ kubeconfig_path }}"
      register: kubeconfig_stat

    - name: Fail if kubeconfig missing
      ansible.builtin.fail:
        msg: "kubeconfig not found at {{ kubeconfig_path }}. Update group_vars/all.yml."
      when: not kubeconfig_stat.stat.exists

    - name: Get pods in namespace
      kubernetes.core.k8s_info:
        kubeconfig: "{{ kubeconfig_path }}"
        api_version: v1
        kind: Pod
        namespace: "{{ micro_namespace }}"
      register: pods_info

    - name: Print pods
      ansible.builtin.debug:
        var: pods_info.resources | map(attribute='metadata.name') | list
